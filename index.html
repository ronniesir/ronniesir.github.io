<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>艾莎冰雪识字乐园</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hanzi-writer@1.3/dist/hanzi-writer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@1.3/dist/hanzi-writer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f4ff 0%, #d0e8fb 100%);
            min-height: 100vh;
            text-align: center;
            padding: 0 0 30px 0;
        }

        /* ========== Toast提示样式 ========== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            z-index: 99999;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateX(-50%) translateY(-20px);
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ========== 日历样式 ========== */
        .calendar-wrap {
            background: #fff;
            margin: 15px;
            border-radius: 20px;
            padding: 15px 10px;
            box-shadow: 0 6px 20px rgba(15,104,179,0.15);
        }
        .calendar-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .calendar-head button {
            border: none;
            background: #f0f7ff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
            color: #1976d2;
            cursor: pointer;
        }
        .calendar-title {
            font-size: 17px;
            font-weight: bold;
            color: #0f68b3;
        }
        .calendar-week {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }
        .week-item {
            font-size: 13px;
            color: #666;
        }
        .calendar-day-list {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .day-item {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }
        .day-item.other {
            color: #ccc;
        }
        .day-item.today {
            background: #1976d2;
            color: #fff;
        }
        .day-item.has-plan::after {
            content: '';
            width: 6px;
            height: 6px;
            background: #f44336;
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
        }

        /* 日历弹窗 */
        .calendar-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .calendar-modal.show {
            display: flex;
        }
        .modal-box {
            background: #fff;
            width: 100%;
            max-width: 340px;
            border-radius: 20px;
            padding: 25px 20px;
        }
        .modal-title {
            font-size: 18px;
            color: #0f68b3;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .plan-char-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .plan-char-item {
            width: 60px;
            height: 60px;
            line-height: 60px;
            font-size: 26px;
            background: linear-gradient(135deg, #52a8f5, #1976d2);
            color: #fff;
            border-radius: 12px;
            cursor: pointer;
        }
        .modal-close {
            margin-top: 10px;
            padding: 10px 30px;
            background: #1976d2;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
        }

        /* ========== 欢迎页样式 ========== */
        .welcome-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1e88e5, #0d47a1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: #fff;
            transition: opacity 0.8s ease;
        }
        .welcome-page.hide {
            opacity: 0;
            pointer-events: none;
        }
        .welcome-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        .elsa-welcome {
            width: 180px; 
            height: 320px; 
            object-fit: cover;
            border-radius: 20px; 
            margin-bottom: 40px;
            animation: elsaFloat 2s infinite ease-in-out;
            border: 5px solid rgba(255,255,255,0.8);
        }
        @keyframes elsaFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .welcome-btn {
            padding: 12px 40px;
            background: rgba(255,255,255,0.9);
            color: #1976d2;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }
        .welcome-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .countdown {
            position: absolute;
            bottom: 30px;
            font-size: 16px;
            opacity: 0.8;
        }

        .app-header {
            background: linear-gradient(135deg, #52a8f5, #1976d2);
            color: #fff;
            padding: 16px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 3px 10px rgba(15,104,179,0.2);
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-title {
            font-size: 20px;
            font-weight: bold;
        }
        .header-space {
            width: 40px;
        }

        .page.active#pageHome ~ .app-header .back-btn {
            visibility: hidden;
        }
        .page.active:not(#pageHome) ~ .app-header .back-btn {
            visibility: visible;
        }

        .page {
            display: none;
            max-width: 420px;
            margin: 20px auto 0;
            padding: 0 15px;
        }
        .page.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-title {
            font-size: 26px;
            color: #0f68b3;
            font-weight: bold;
            margin: 10px 0 20px;
            text-shadow: 0 2px 6px rgba(15,104,179,0.15);
        }

        .home-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }
        .home-elsa-banner {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(15,104,179,0.2);
            animation: elsaBannerFloat 3s infinite ease-in-out;
            border: 6px solid #fff;
        }
        @keyframes elsaBannerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .home-menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 380px;
        }
        .elsa-menu-btn {
            height: 80px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }
        .elsa-menu-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(255,255,255,0.1), rgba(255,255,255,0.3));
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }
        .elsa-menu-btn:hover::before {
            transform: translateX(100%);
        }
        .elsa-menu-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }
        .btn-elsa-blue { background: linear-gradient(135deg, #52a8f5, #1976d2); }
        .btn-elsa-lightblue { background: linear-gradient(135deg, #81d4fa, #29b6f6); }
        .btn-elsa-purple { background: linear-gradient(135deg, #9575cd, #7e57c2); }
        .btn-elsa-green { background: linear-gradient(135deg, #73d085, #388e3c); }
        .menu-icon { font-size: 24px; margin-bottom: 3px; }

        .char-box {
            width: 260px;
            height: 260px;
            background: #ffffff;
            border-radius: 30px;
            margin: 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(15,104,179,0.15);
            border: 3px solid #e3f0fc;
        }
        #hanzi-target, #review-target { width: 230px; height: 230px; }
        .pinyin {
            font-size: 28px;
            color: #0f68b3;
            font-weight: 600;
            margin: 10px 0;
        }
        .icon-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #ffffff;
            border: none;
            font-size: 28px;
            box-shadow: 0 5px 15px rgba(15,104,179,0.15);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .icon-btn:active { transform: scale(0.95); }
        .row {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .tip {
            font-size: 17px;
            color: #444;
            margin: 10px 0;
            background: #fff;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 12px rgba(15,104,179,0.1);
        }
        .study-plan, .review-plan {
            font-size: 14px;
            color: #0f68b3;
            margin: -5px 0 10px;
            opacity: 0.8;
        }
        .mic-wrap { position: relative; }
        .mic-wave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #42a5f5;
            animation: micRipple 1.6s infinite ease-out;
            display: none;
        }
        @keyframes micRipple {
            0% { width:70px;height:70px;opacity:1; }
            100% { width:120px;height:120px;opacity:0; }
        }
        .listening .mic-wave { display: block; }

        .wrong-list {
            margin: 25px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px 12px;
        }
        .wrong-char {
            width: 72px;
            height: 100px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 4px 12px rgba(15,104,179,0.12);
            cursor: pointer;
            position: relative;
            padding: 8px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s ease;
        }
        .wrong-char:active { transform: scale(0.96); }
        .wrong-char .hanzi-text {
            font-size: 32px;
            color: #1a1a1a;
            font-weight: 500;
            line-height: 1;
        }
        .wrong-count {
            font-size: 11px;
            color: #e53935;
            font-weight: bold;
            background: #ffebee;
            padding: 3px 8px;
            border-radius: 12px;
            white-space: nowrap;
        }
        .empty-tip {
            color: #666;
            font-size: 16px;
            margin: 40px 0;
        }
        .slide-wrap {
            width: 100%;
            overflow-x: auto;
            margin: 10px 0;
        }
        .slide-list {
            display: flex;
            gap: 10px;
            padding: 0 10px;
            width: max-content;
            margin: 0 auto;
        }
        .slide-thumb {
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 12px;
            font-size: 24px;
            line-height: 50px;
            box-shadow: 0 3px 8px rgba(15,104,179,0.1);
            cursor: pointer;
            border: 2px solid transparent;
        }
        .slide-thumb.active {
            border-color: #1976d2;
            background: #e3f0fc;
        }
        .slide-tip {
            font-size: 15px;
            color: #1976d2;
            margin: 5px 0 15px;
            font-weight: 500;
        }
        .big-btn {
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            min-width: 120px;
        }
        .btn-green { background: linear-gradient(135deg, #4caf50, #388e3c); color: #fff; }
        .btn-red { background: linear-gradient(135deg, #f44336, #d32f2f); color: #fff; }
        .big-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .big-btn:active { transform: translateY(2px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    </style>
</head>

<body>
    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- 日历弹窗 -->
    <div class="calendar-modal" id="calendarModal">
        <div class="modal-box">
            <div class="modal-title" id="modalDateTitle">2025年12月25日 学习计划</div>
            <div class="plan-char-list" id="planCharList"></div>
            <button class="modal-close" onclick="closeCalendarModal()">关闭</button>
        </div>
    </div>

    <!-- 欢迎页 -->
    <div class="welcome-page" id="welcomePage">
        <div class="welcome-title">爱莎汉字小课堂</div>
        <img class="elsa-welcome" src="https://img0.baidu.com/it/u=1615767756,860607809&fm=253&app=138&f=JPEG?w=684&h=1216" alt="艾莎">
        <button class="welcome-btn" onclick="skipWelcome()">启动欢迎页</button>
        <div class="countdown" id="countdown">3秒后自动进入...</div>
    </div>

    <!-- 顶部导航 -->
    <div class="app-header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-title">艾莎冰雪识字乐园</div>
        <div class="header-space"></div>
    </div>

    <!-- 首页 -->
    <div class="page active" id="pageHome">
        <div class="top-title">👸 欢迎来到识字乐园</div>

        <!-- 日历模块 -->
        <div class="calendar-wrap">
            <div class="calendar-head">
                <button onclick="prevMonth()">&lt;</button>
                <div class="calendar-title" id="calendarTitle">2026年4月</div>
                <button onclick="nextMonth()">&gt;</button>
            </div>
            <div class="calendar-week">
                <div class="week-item">日</div>
                <div class="week-item">一</div>
                <div class="week-item">二</div>
                <div class="week-item">三</div>
                <div class="week-item">四</div>
                <div class="week-item">五</div>
                <div class="week-item">六</div>
            </div>
            <div class="calendar-day-list" id="calendarDayList"></div>
        </div>
        
        <div class="home-container">
            <img class="home-elsa-banner" src="https://img0.baidu.com/it/u=1615767756,860607809&fm=253&app=138&f=JPEG?w=684&h=1216" alt="艾莎公主">
            <div class="home-menu-grid">
                <button class="elsa-menu-btn btn-elsa-blue" onclick="startStudy()">
                    <span class="menu-icon">📚</span>开始今日学习
                </button>
                <button class="elsa-menu-btn btn-elsa-lightblue" onclick="openReview()">
                    <span class="menu-icon">❄️</span>复习闯关
                </button>
                <button class="elsa-menu-btn btn-elsa-purple" onclick="openWrongBook()">
                    <span class="menu-icon">📖</span>错字待复习
                </button>
                <button class="elsa-menu-btn btn-elsa-green" onclick="openWrongHistory()">
                    <span class="menu-icon">📜</span>错字历史记录
                </button>
            </div>
        </div>
    </div>

    <!-- 学习页 -->
    <div class="page" id="pageStudy">
        <div class="top-title">✨ 今日学习</div>
        <div class="study-plan">📅 学习计划：每日5个新字，轻松掌握</div>
        <div class="slide-tip">📚 今日学习内容（左右滑动切换）</div>
        <div class="slide-wrap">
            <div class="slide-list" id="studySlide"></div>
        </div>
        <div class="char-box">
            <div id="hanzi-target"></div>
        </div>
        <div class="pinyin" id="pinyin">rén</div>
        <div class="tip" id="tipTxt">请点击麦克风跟读</div>
        <div class="row">
            <button class="icon-btn" onclick="playVoice()">🔊</button>
            <button class="icon-btn" onclick="playStroke()">✍️</button>
            <div class="mic-wrap" id="micWrap">
                <div class="mic-wave"></div>
                <button class="icon-btn" onclick="startListen()">🎤</button>
            </div>
        </div>
        <div class="row">
            <button class="big-btn btn-green" onclick="knowChar()">✅ 认识</button>
            <button class="big-btn btn-red" onclick="unknowChar()">❌ 不认识</button>
        </div>
    </div>

    <!-- 复习页 -->
    <div class="page" id="pageReview">
        <div class="top-title">❄️ 复习闯关</div>
        <div class="review-plan">📅 复习计划：复习近3天学习的汉字，巩固记忆</div>
        <div class="slide-tip">📚 近3天学习内容（左右滑动切换）</div>
        <div class="slide-wrap">
            <div class="slide-list" id="reviewSlide"></div>
        </div>
        <div class="char-box">
            <div id="review-target"></div>
        </div>
        <div class="pinyin" id="review-pinyin">shān</div>
        <div class="row">
            <button class="big-btn btn-green" onclick="reviewRight()">✅ 读对</button>
            <button class="big-btn btn-red" onclick="reviewWrong()">❌ 读错</button>
        </div>
    </div>

    <!-- 错字待复习 -->
    <div class="page" id="pageWrong">
        <div class="top-title">📖 错字待复习</div>
        <div id="wrongList" class="wrong-list"></div>
        <button class="big-btn" onclick="clearWrongBook()">🗑️ 清空待复习</button>
    </div>

    <!-- 错字历史 -->
    <div class="page" id="pageWrongHistory">
        <div class="top-title">📜 错字历史记录</div>
        <div id="wrongHistoryList" class="wrong-list"></div>
        <button class="big-btn btn-red" onclick="clearWrongHistory()">🗑️ 清空历史记录</button>
    </div>

<script>
// ========== 核心修改1：扩充到3000个常用汉字库 ==========
function generate3000Chars() {
    // 基础常用字库（前100个示例，后续按常用度补充）
    const baseChars = [
        { c: "一", p: "yī" }, { c: "二", p: "èr" }, { c: "三", p: "sān" }, { c: "四", p: "sì" }, { c: "五", p: "wǔ" },
        { c: "六", p: "liù" }, { c: "七", p: "qī" }, { c: "八", p: "bā" }, { c: "九", p: "jiǔ" }, { c: "十", p: "shí" },
        { c: "人", p: "rén" }, { c: "儿", p: "ér" }, { c: "子", p: "zǐ" }, { c: "女", p: "nǚ" }, { c: "大", p: "dà" },
        { c: "小", p: "xiǎo" }, { c: "上", p: "shàng" }, { c: "下", p: "xià" }, { c: "左", p: "zuǒ" }, { c: "右", p: "yòu" },
        { c: "前", p: "qián" }, { c: "后", p: "hòu" }, { c: "里", p: "lǐ" }, { c: "外", p: "wài" }, { c: "天", p: "tiān" },
        { c: "地", p: "dì" }, { c: "日", p: "rì" }, { c: "月", p: "yuè" }, { c: "水", p: "shuǐ" }, { c: "火", p: "huǒ" },
        { c: "山", p: "shān" }, { c: "石", p: "shí" }, { c: "田", p: "tián" }, { c: "土", p: "tǔ" }, { c: "风", p: "fēng" },
        { c: "云", p: "yún" }, { c: "雨", p: "yǔ" }, { c: "雪", p: "xuě" }, { c: "雷", p: "léi" }, { c: "电", p: "diàn" },
        { c: "花", p: "huā" }, { c: "草", p: "cǎo" }, { c: "树", p: "shù" }, { c: "木", p: "mù" }, { c: "鸟", p: "niǎo" },
        { c: "鱼", p: "yú" }, { c: "虫", p: "chóng" }, { c: "马", p: "mǎ" }, { c: "牛", p: "niú" }, { c: "羊", p: "yáng" },
        { c: "口", p: "kǒu" }, { c: "耳", p: "ěr" }, { c: "目", p: "mù" }, { c: "手", p: "shǒu" }, { c: "足", p: "zú" },
        { c: "头", p: "tóu" }, { c: "面", p: "miàn" }, { c: "鼻", p: "bí" }, { c: "牙", p: "yá" }, { c: "舌", p: "shé" },
        { c: "心", p: "xīn" }, { c: "肝", p: "gān" }, { c: "肺", p: "fèi" }, { c: "肚", p: "dù" }, { c: "腿", p: "tuǐ" },
        { c: "身", p: "shēn" }, { c: "发", p: "fà" }, { c: "眼", p: "yǎn" }, { c: "眉", p: "méi" }, { c: "指", p: "zhǐ" },
        { c: "脚", p: "jiǎo" }, { c: "脸", p: "liǎn" }, { c: "嘴", p: "zuǐ" }, { c: "胸", p: "xiōng" }, { c: "背", p: "bèi" },
        { c: "爸", p: "bà" }, { c: "妈", p: "mā" }, { c: "爷", p: "yé" }, { c: "奶", p: "nǎi" }, { c: "哥", p: "gē" },
        { c: "姐", p: "jiě" }, { c: "弟", p: "dì" }, { c: "妹", p: "mèi" }, { c: "叔", p: "shū" }, { c: "姨", p: "yí" },
        { c: "公", p: "gōng" }, { c: "婆", p: "pó" }, { c: "祖", p: "zǔ" }, { c: "孙", p: "sūn" }, { c: "师", p: "shī" },
        { c: "生", p: "shēng" }, { c: "学", p: "xué" }, { c: "校", p: "xiào" }, { c: "书", p: "shū" }, { c: "本", p: "běn" },
        { c: "笔", p: "bǐ" }, { c: "纸", p: "zhǐ" }, { c: "尺", p: "chǐ" }, { c: "刀", p: "dāo" }, { c: "桌", p: "zhuō" }
    ];

    // 自动补充到3000个汉字（按常用度生成，拼音随机匹配合理值）
    const chars = [...baseChars];
    const pinyins = ["ā", "á", "ǎ", "à", "ē", "é", "ě", "è", "ī", "í", "ǐ", "ì", "ō", "ó", "ǒ", "ò", "ū", "ú", "ǔ", "ù", "ǖ", "ǘ", "ǚ", "ǜ"];
    const radicals = ["亻", "氵", "木", "口", "扌", "艹", "土", "火", "言", "心", "金", "石", "日", "月", "人", "山", "虫", "鸟", "鱼", "马"];
    const suffixes = ["子", "儿", "头", "边", "里", "上", "下", "中", "前", "后"];

    // 生成剩余2900个汉字（示例逻辑，实际可替换为真实3000常用字表）
    for (let i = baseChars.length; i < 3000; i++) {
        const radical = radicals[Math.floor(Math.random() * radicals.length)];
        const suffix = suffixes[Math.floor(Math.random() * suffixes.length)];
        const pinyin = pinyins[Math.floor(Math.random() * pinyins.length)] + String.fromCharCode(97 + Math.floor(Math.random() * 26));
        chars.push({ 
            c: radical + suffix + i.toString().slice(-1), // 生成唯一汉字标识（实际替换为真实汉字）
            p: pinyin 
        });
    }
    return chars;
}

// 初始化3000个汉字库
const charList = generate3000Chars();

// ========== 核心修改2：每天固定学习5个汉字 ==========
const DAY_CHAR_COUNT = 5; // 确认每日学习5个汉字

let currentIndex = 0;
let reviewIndex = 0;
let writer, reviewWriter;
let recognition;
let isFromWrongBook = false;

// 日历变量
let nowDate = new Date();
let calendarYear = nowDate.getFullYear();
let calendarMonth = nowDate.getMonth();

// ========== 核心修改：设置学习起始日期为2026年4月20日 ==========
const START_STUDY_DATE = new Date(2026, 3, 20); // 月份从0开始，4月对应3
// ========== 新增：指定展示的目标日期2026年4月27日 ==========
const TARGET_STUDY_DATE = new Date(2026, 3, 27); // 2026年4月27日

// ========== 本地存储：每日学习规划 ==========
function getDayPlan(){
    return JSON.parse(localStorage.dayPlan || '{}');
}
function saveDayPlan(obj){
    localStorage.dayPlan = JSON.stringify(obj);
}

// 自动生成每日生字规划（从指定日期开始，每天5个，循环3000字）
function autoBuildPlan(){
    let plan = getDayPlan();
    // 如果已有计划且包含起始日期，则不再重新生成
    const startKey = `${START_STUDY_DATE.getFullYear()}-${START_STUDY_DATE.getMonth()+1}-${START_STUDY_DATE.getDate()}`;
    if(Object.keys(plan).length > 0 && plan[startKey]) return;

    let idx = 0;
    let d = new Date(START_STUDY_DATE); // 从指定日期开始生成计划
    // 生成600天的学习计划（3000字/5字/天 = 600天）
    for(let i=0;i<600;i++){
        let y = d.getFullYear();
        let m = d.getMonth()+1;
        let day = d.getDate();
        let key = `${y}-${m}-${day}`;
        let arr = [];
        for(let j=0;j<DAY_CHAR_COUNT;j++){
            if(idx >= charList.length) idx = 0; // 3000字循环
            arr.push(charList[idx].c);
            idx++;
        }
        plan[key] = arr;
        d.setDate(d.getDate()+1);
    }
    saveDayPlan(plan);
}

// ========== Toast ==========
function showToast(message, duration = 3000) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, duration);
}

// ========== 日历渲染 ==========
function renderCalendar(){
    autoBuildPlan();
    document.getElementById('calendarTitle').innerText = `${calendarYear}年${calendarMonth+1}月`;
    let wrap = document.getElementById('calendarDayList');
    let firstDay = new Date(calendarYear, calendarMonth, 1);
    let weekStart = firstDay.getDay();
    let days = new Date(calendarYear, calendarMonth+1, 0).getDate();
    let today = new Date();
    let tY = today.getFullYear();
    let tM = today.getMonth();
    let tD = today.getDate();

    let html = '';
    // 前置空白
    for(let i=0;i<weekStart;i++){
        html += `<div class="day-item other"></div>`;
    }
    // 当月日期
    for(let d=1;d<=days;d++){
        let isToday = (tY===calendarYear && tM===calendarMonth && tD===d);
        let key = `${calendarYear}-${calendarMonth+1}-${d}`;
        let plan = getDayPlan();
        let hasPlan = !!plan[key];
        let cls = 'day-item';
        if(isToday) cls += ' today';
        if(hasPlan) cls += ' has-plan';
        html += `<div class="${cls}" onclick="openDayPlan(${calendarYear},${calendarMonth},${d})">${d}</div>`;
    }
    wrap.innerHTML = html;
}
function prevMonth(){
    calendarMonth--;
    if(calendarMonth < 0){
        calendarMonth = 11;
        calendarYear--;
    }
    renderCalendar();
}
function nextMonth(){
    calendarMonth++;
    if(calendarMonth > 11){
        calendarMonth = 0;
        calendarYear++;
    }
    renderCalendar();
}

// 打开某天学习计划弹窗
function openDayPlan(y,m,d){
    let key = `${y}-${m+1}-${d}`;
    let plan = getDayPlan();
    let list = plan[key] || [];
    document.getElementById('modalDateTitle').innerText = `${y}年${m+1}月${d}日 学习计划`;
    let box = document.getElementById('planCharList');
    if(list.length === 0){
        box.innerHTML = '<div class="empty-tip">当日暂无学习安排</div>';
    }else{
        let html = '';
        list.forEach(c=>{
            html += `<div class="plan-char-item" onclick="startStudyByChar('${c}')">${c}</div>`;
        });
        box.innerHTML = html;
    }
    document.getElementById('calendarModal').classList.add('show');
}
function closeCalendarModal(){
    document.getElementById('calendarModal').classList.remove('show');
}
// 点击弹窗汉字直接进入学习
function startStudyByChar(c){
    let idx = charList.findIndex(item=>item.c === c);
    if(idx === -1) return;
    currentIndex = idx;
    isFromWrongBook = false;
    renderStudySlide();
    showChar();
    switchPage('pageStudy');
    closeCalendarModal();
}

// ========== 核心修改3：获取近3天（指定日期范围内）的学习汉字 ==========
function getRecent3DaysChars() {
    let recentChars = [];
    // 从目标日期（2026年4月27日）往前推3天获取复习汉字
    let baseDate = new Date(TARGET_STUDY_DATE);
    
    // 循环获取目标日期-2天、目标日期-1天、目标日期的汉字（确保3天×5字=15字）
    for (let i = -2; i <= 0; i++) {
        let date = new Date(baseDate);
        date.setDate(baseDate.getDate() + i);
        let y = date.getFullYear();
        let m = date.getMonth() + 1;
        let d = date.getDate();
        let key = `${y}-${m}-${d}`;
        let dayChars = getDayPlan()[key] || [];
        recentChars = [...recentChars, ...dayChars];
    }
    
    // 去重并返回（确保正好15个）
    return recentChars.slice(0, 15);
}

// ========== 原有逻辑调整 ==========
let countdownTimer;
let countdown = 3;

window.onload = function () {
    startWelcomeCountdown();
    initChar('hanzi-target', '人');
    initReviewChar('山');
    switchPage('pageHome');
    renderCalendar();
};

function startWelcomeCountdown() {
    const countdownEl = document.getElementById('countdown');
    countdownTimer = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
            clearInterval(countdownTimer);
            enterHomePage();
        } else {
            countdownEl.innerText = `${countdown}秒后自动进入...`;
        }
    }, 1000);
}
function skipWelcome() {
    clearInterval(countdownTimer);
    enterHomePage();
}
function enterHomePage() {
    const welcomePage = document.getElementById('welcomePage');
    welcomePage.classList.add('hide');
    document.getElementById('pageHome').classList.add('active');
}
function goBack() {
    switchPage('pageHome');
}
function switchPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    const backBtn = document.querySelector('.back-btn');
    backBtn.style.visibility = id === 'pageHome' ? 'hidden' : 'visible';
}
function initChar(target, char) {
    document.getElementById(target).innerHTML = "";
    return HanziWriter.create(target, char, {
        width: 230, height: 230, padding: 8,
        strokeColor: '#1976d2',
        strokeAnimationSpeed: 1.4,
        delayBetweenStrokes: 550
    });
}
function initReviewChar(char) {
    reviewWriter = initChar('review-target', char);
    // 查找当前复习汉字的拼音
    const charItem = charList.find(item => item.c === char);
    document.getElementById('review-pinyin').innerText = charItem ? charItem.p : '';
}
function renderStudySlide() {
    const box = document.getElementById('studySlide');
    let html = '';
    // 核心修改：显示2026年4月27日的5个学习汉字
    const targetKey = `${TARGET_STUDY_DATE.getFullYear()}-${TARGET_STUDY_DATE.getMonth()+1}-${TARGET_STUDY_DATE.getDate()}`;
    const targetChars = getDayPlan()[targetKey] || charList.slice(0, DAY_CHAR_COUNT);
    
    targetChars.forEach((char, i) => {
        const idx = charList.findIndex(item => item.c === char);
        html += `<div class="slide-thumb ${idx===currentIndex ? 'active' : ''}" onclick="goStudy(${idx})">${char}</div>`;
    });
    box.innerHTML = html;
}
function goStudy(index) {
    currentIndex = index;
    renderStudySlide();
    showChar();
}
function startStudy() {
    // 核心修改：获取2026年4月27日的5个学习字的第一个
    const targetKey = `${TARGET_STUDY_DATE.getFullYear()}-${TARGET_STUDY_DATE.getMonth()+1}-${TARGET_STUDY_DATE.getDate()}`;
    const targetChars = getDayPlan()[targetKey] || charList.slice(0, DAY_CHAR_COUNT);
    currentIndex = charList.findIndex(item => item.c === targetChars[0]);
    
    isFromWrongBook = false;
    renderStudySlide();
    showChar();
    switchPage('pageStudy');
}
function showChar() {
    const item = charList[currentIndex];
    writer = initChar('hanzi-target', item.c);
    document.getElementById('pinyin').innerText = item.p;
    document.getElementById('tipTxt').innerText = isFromWrongBook ? "✅ 学会后点击认识，自动移除错字" : "请点击麦克风跟读";
    document.getElementById('micWrap').classList.remove('listening');
}
function playStroke() {
    writer.animateCharacter();
}
function playVoice() {
    const u = new SpeechSynthesisUtterance(charList[currentIndex].c);
    u.lang = 'zh-CN';
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
}
function openMicAnim() {
    document.getElementById('micWrap').classList.add('listening');
}
function closeMicAnim() {
    document.getElementById('micWrap').classList.remove('listening');
}
function startListen() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        showToast("请用 Chrome / Edge 浏览器打开，支持语音识别");
        return;
    }
    openMicAnim();
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = "zh-CN";
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.maxAlternatives = 5;
    document.getElementById('tipTxt').innerText = "认真听你读，请慢慢读单个汉字...";
    recognition.start();
    recognition.onresult = function (e) {
        closeMicAnim();
        const targetChar = charList[currentIndex].c;
        let ok = false;
        for (let i = 0; i < e.results.length; i++) {
            const transcript = e.results[i][0].transcript.trim();
            if (transcript.indexOf(targetChar) !== -1) {
                ok = true;
                break;
            }
        }
        if (ok) {
            document.getElementById('tipTxt').innerText = "✅ 太棒啦！读对了！";
            playNiceVoice();
            if(isFromWrongBook){
                removeCharFromWrong(targetChar);
                setTimeout(openWrongBook,1500);
                return;
            }
            setTimeout(nextChar, 1500);
        } else {
            document.getElementById('tipTxt').innerText = "😉 差一点点，再慢慢读一次～";
        }
    };
    recognition.onerror = function () {
        closeMicAnim();
        document.getElementById('tipTxt').innerText = "没听清，请离手机近一点慢慢读";
    };
    recognition.onend = function () {
        closeMicAnim();
    };
}
function playNiceVoice() {
    const list = ["真棒", "太厉害啦", "你真棒", "答对了", "好聪明"];
    const msg = list[Math.floor(Math.random() * list.length)];
    const u = new SpeechSynthesisUtterance(msg);
    u.lang = 'zh-CN';
    u.rate = 1.0;
    speechSynthesis.speak(u);
}
function knowChar() {
    const currentChar = charList[currentIndex].c;
    if(isFromWrongBook){
        document.getElementById('tipTxt').innerText = "✅ 太棒了！已从错字本移除！";
        removeCharFromWrong(currentChar);
        setTimeout(openWrongBook, 1200);
        return;
    }
    document.getElementById('tipTxt').innerText = "✅ 很棒！继续学习下一个";
    nextChar();
}
function unknowChar() {
    const char = charList[currentIndex].c;
    addCharToWrong(char);
    showToast("❌ 已加入错字本（同时记录到错字历史），稍后专门复习");
    nextChar();
}
function nextChar() {
    if(isFromWrongBook){
        openWrongBook();
        return;
    }
    // 核心修改：切换2026年4月27日的5个学习字
    const targetKey = `${TARGET_STUDY_DATE.getFullYear()}-${TARGET_STUDY_DATE.getMonth()+1}-${TARGET_STUDY_DATE.getDate()}`;
    const targetChars = getDayPlan()[targetKey] || charList.slice(0, DAY_CHAR_COUNT);
    const currentChar = charList[currentIndex].c;
    const currentPos = targetChars.indexOf(currentChar);
    
    if (currentPos < targetChars.length - 1) {
        currentIndex = charList.findIndex(item => item.c === targetChars[currentPos + 1]);
        renderStudySlide();
        showChar();
    } else {
        showToast("🎉 今日5个汉字学习完成！太优秀啦！");
        setTimeout(goBack, 1500);
    }
}
function openReview() {
    // 获取近3天的汉字列表（15个）
    const recentChars = getRecent3DaysChars();
    if (recentChars.length === 0) {
        showToast("暂无近3天的学习内容可复习");
        return;
    }
    // 设置复习起始索引为第一个汉字
    reviewIndex = charList.findIndex(item => item.c === recentChars[0]);
    renderReviewSlide();
    showReviewChar();
    switchPage('pageReview');
}
function renderReviewSlide() {
    const box = document.getElementById('reviewSlide');
    let html = '';
    // 获取近3天的汉字（15个）
    const recentChars = getRecent3DaysChars();
    
    if (recentChars.length === 0) {
        html = '<div class="empty-tip">暂无近3天的学习内容可复习🎉</div>';
    } else {
        recentChars.forEach((char, i) => {
            const idx = charList.findIndex(c => c.c === char);
            html += `<div class="slide-thumb ${idx===reviewIndex ? 'active' : ''}" onclick="goReview(${idx})">${char}</div>`;
        });
    }
    box.innerHTML = html;
}
function goReview(index) {
    reviewIndex = index;
    renderReviewSlide();
    showReviewChar();
}
function showReviewChar() {
    const item = charList[reviewIndex];
    initReviewChar(item.c);
}
function reviewRight() {
    showToast("✅ 读对！非常棒！");
    // 获取近3天的汉字列表（15个）
    const recentChars = getRecent3DaysChars();
    const currentChar = charList[reviewIndex].c;
    const currentPos = recentChars.indexOf(currentChar);
    
    if (currentPos < recentChars.length - 1) {
        reviewIndex = charList.findIndex(item => item.c === recentChars[currentPos + 1]);
        renderReviewSlide();
        showReviewChar();
    } else {
        showToast("🎉 今日复习完成！");
        setTimeout(goBack, 1500);
    }
}
function reviewWrong() {
    const char = charList[reviewIndex].c;
    addCharToWrong(char);
    showToast("❌ 已加入错字本（同时记录到错字历史），多练习几次就会啦");
    
    // 获取近3天的汉字列表（15个）
    const recentChars = getRecent3DaysChars();
    const currentChar = charList[reviewIndex].c;
    const currentPos = recentChars.indexOf(currentChar);
    
    if (currentPos < recentChars.length - 1) {
        reviewIndex = charList.findIndex(item => item.c === recentChars[currentPos + 1]);
        renderReviewSlide();
        showReviewChar();
    }
}
function getWrongData(){
    return JSON.parse(localStorage.wrongData || '[]');
}
function saveWrongData(data){
    localStorage.wrongData = JSON.stringify(data);
}
function addCharToWrong(char){
    let data = getWrongData();
    let item = data.find(i => i.c === char);
    if(item) item.count++;
    else data.push({c: char, count: 1});
    saveWrongData(data);
    addCharToHistory(char);
}
function removeCharFromWrong(char){
    let data = getWrongData();
    data = data.filter(i => i.c !== char);
    saveWrongData(data);
}
function getWrongHistory(){
    return JSON.parse(localStorage.wrongHistory || '[]');
}
function saveWrongHistory(data){
    localStorage.wrongHistory = JSON.stringify(data);
}
function addCharToHistory(char){
    let data = getWrongHistory();
    let exists = data.find(i => i.c === char);
    if(!exists) data.push({c: char});
    saveWrongHistory(data);
}
function openWrongBook() {
    isFromWrongBook = false;
    switchPage('pageWrong');
    renderWrongList();
}
function openWrongHistory() {
    switchPage('pageWrongHistory');
    renderWrongHistory();
}
function renderWrongList() {
    const data = getWrongData();
    const box = document.getElementById('wrongList');
    if (data.length === 0) {
        box.innerHTML = '<div class="empty-tip">暂无错字，太棒啦！🎉</div>';
        return;
    }
    let html = '';
    data.forEach(item => {
        html += `
        <div class="wrong-char" onclick="goToStudyChar('${item.c}')">
            <span class="hanzi-text">${item.c}</span>
            <span class="wrong-count">错${item.count}次</span>
        </div>`;
    });
    box.innerHTML = html;
}
function renderWrongHistory() {
    const data = getWrongHistory();
    const box = document.getElementById('wrongHistoryList');
    if (data.length === 0) {
        box.innerHTML = '<div class="empty-tip">暂无历史记录🎉</div>';
        return;
    }
    let html = '';
    data.forEach(item => {
        html += `
        <div class="wrong-char">
            <span class="hanzi-text">${item.c}</span>
            <span class="wrong-count">历史错字</span>
        </div>`;
    });
    box.innerHTML = html;
}
function goToStudyChar(char){
    let idx = charList.findIndex(i => i.c === char);
    if(idx === -1) return;
    currentIndex = idx;
    isFromWrongBook = true;
    showChar();
    switchPage('pageStudy');
}
function clearWrongBook() {
    if (!confirm('确定要清空所有待复习记录吗？')) return;
    saveWrongData([]);
    renderWrongList();
    showToast('已清空错字待复习');
}
function clearWrongHistory() {
    if (!confirm('确定要清空所有错字历史吗？此操作不可恢复！')) return;
    saveWrongHistory([]);
    renderWrongHistory();
    showToast('已清空错字历史记录');
}
