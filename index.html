<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>艾莎冰雪识字乐园</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/hanzi-writer@1.3/dist/hanzi-writer.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@1.3/dist/hanzi-writer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pinyin-pro/3.23.0/index.js"></script>
  </head>

  <body>
    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- 日历弹窗 -->
    <div class="calendar-modal" id="calendarModal">
      <div class="modal-box">
        <div class="modal-title" id="modalDateTitle">
          2025年12月25日 学习计划
        </div>
        <div class="plan-char-list" id="planCharList"></div>
        <button class="modal-close" onclick="closeCalendarModal()">关闭</button>
      </div>
    </div>

    <!-- 欢迎页 -->
    <div class="welcome-page" id="welcomePage">
      <div class="welcome-title">爱莎汉字小课堂</div>
      <img
        class="elsa-welcome"
        src="https://img0.baidu.com/it/u=1615767756,860607809&fm=253&app=138&f=JPEG?w=684&h=1216"
        alt="艾莎"
      />
      <button class="welcome-btn" onclick="skipWelcome()">启动欢迎页</button>
      <div class="countdown" id="countdown">3秒后自动进入...</div>
    </div>

    <!-- 顶部导航 -->
    <div class="app-header">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="header-title">艾莎冰雪识字乐园</div>
      <div class="header-space"></div>
    </div>

    <!-- 首页 -->
    <div class="page active" id="pageHome">
      <div class="top-title">👸 欢迎来到识字乐园</div>

      <!-- 日历模块 -->
      <div class="calendar-wrap">
        <div class="calendar-head">
          <button onclick="prevMonth()">&lt;</button>
          <div class="calendar-title" id="calendarTitle">2026年4月</div>
          <button onclick="nextMonth()">&gt;</button>
        </div>
        <div class="calendar-week">
          <div class="week-item">日</div>
          <div class="week-item">一</div>
          <div class="week-item">二</div>
          <div class="week-item">三</div>
          <div class="week-item">四</div>
          <div class="week-item">五</div>
          <div class="week-item">六</div>
        </div>
        <div class="calendar-day-list" id="calendarDayList"></div>
      </div>

      <div class="home-container">
        <div class="home-menu-grid">
          <button class="elsa-menu-btn btn-elsa-blue" onclick="startStudy()">
            <span class="menu-icon">📚</span>开始今日学习
          </button>
          <button
            class="elsa-menu-btn btn-elsa-lightblue"
            onclick="openReview()"
          >
            <span class="menu-icon">❄️</span>复习闯关
          </button>
          <button
            class="elsa-menu-btn btn-elsa-purple"
            onclick="openAllChars()"
          >
            <span class="menu-icon">📝</span>全部汉字
          </button>
          <button
            class="elsa-menu-btn btn-elsa-green"
            onclick="openCustomStudy()"
          >
            <span class="menu-icon">✏️</span>自定义学习
          </button>
          <button
            class="elsa-menu-btn btn-elsa-blue"
            onclick="openLearnedChars()"
          >
            <span class="menu-icon">🎓</span>已认识汉字
          </button>
          <button
            class="elsa-menu-btn btn-elsa-lightblue"
            onclick="openWrongBook()"
          >
            <span class="menu-icon">📖</span>错字待复习
          </button>
        </div>
      </div>
    </div>

    <!-- 学习页 -->
    <div class="page" id="pageStudy">
      <div class="top-title" id="studyTitle">✨ 今日学习</div>
      <div class="study-plan" id="studyPlan">📅 学习计划：每日5个新字，轻松掌握</div>
      <div class="slide-tip" id="studyTip">📚 今日学习内容（左右滑动切换）</div>
      <div class="slide-wrap">
        <div class="slide-list" id="studySlide"></div>
      </div>
      <div class="char-box">
        <div id="hanzi-target"></div>
      </div>
      <div class="pinyin" id="pinyin">rén</div>
      <div class="tip" id="tipTxt">请点击麦克风跟读</div>
      <div class="row">
        <button class="icon-btn" onclick="playVoice()">🔊</button>
        <button class="icon-btn" onclick="playStroke()">✍️</button>
        <div class="mic-wrap" id="micWrap">
          <div class="mic-wave"></div>
          <button class="icon-btn" onclick="startListen()">🎤</button>
        </div>
      </div>
      <div class="row">
        <button class="big-btn btn-green" onclick="knowChar()">✅ 认识</button>
        <button class="big-btn btn-red" onclick="unknowChar()">
          ❌ 不认识
        </button>
      </div>
    </div>

    <!-- 复习页 -->
    <div class="page" id="pageReview">
      <div class="top-title">❄️ 复习闯关</div>
      <div class="review-plan">📅 复习计划：复习近3天学习的汉字，巩固记忆</div>
      <div class="slide-tip">📚 近3天学习内容（左右滑动切换）</div>
      <div class="slide-wrap">
        <div class="slide-list" id="reviewSlide"></div>
      </div>
      <div class="char-box">
        <div id="review-target"></div>
      </div>
      <div class="pinyin" id="review-pinyin">shān</div>
      <div class="row">
        <button class="big-btn btn-green" onclick="reviewRight()">
          ✅ 读对
        </button>
        <button class="big-btn btn-red" onclick="reviewWrong()">❌ 读错</button>
      </div>
    </div>

    <!-- 错字待复习 -->
    <div class="page" id="pageWrong">
      <div class="top-title">📖 错字待复习</div>
      <div id="wrongList" class="wrong-list"></div>
      <button class="big-btn" onclick="clearWrongBook()">🗑️ 清空待复习</button>
    </div>

    <!-- 错字历史 -->
    <div class="page" id="pageWrongHistory">
      <div class="top-title">📜 错字历史记录</div>
      <div id="wrongHistoryList" class="wrong-list"></div>
      <button class="big-btn btn-red" onclick="clearWrongHistory()">
        🗑️ 清空历史记录
      </button>
    </div>

    <!-- 全部汉字展示页面 -->
    <div class="page" id="pageAllChars">
      <div class="top-title">📚 全部汉字展示</div>
      <div class="tip">共3000个常用汉字，点击汉字可进入学习</div>
      <div class="char-grid" id="allCharsGrid"></div>
      <div class="row">
        <button class="big-btn btn-green" onclick="goBack()">返回首页</button>
      </div>
    </div>

    <!-- 自定义学习页面 -->
    <div class="page" id="pageCustomStudy">
      <div class="top-title">✏️ 自定义学习</div>
      <div class="tip">请输入要学习的汉字，直接输入即可</div>
      <div class="input-wrap">
        <input
          type="text"
          id="customCharsInput"
          placeholder="例如：你好学习"
          class="custom-input"
        />
      </div>
      <div class="row">
        <button class="big-btn btn-green" onclick="startCustomStudy()">
          开始学习
        </button>
      </div>
      <div class="slide-wrap" style="display: none" id="customSlideWrap">
        <div class="slide-list" id="customSlide"></div>
      </div>
      <div class="char-box" style="display: none" id="customCharBox">
        <div id="custom-target"></div>
      </div>
      <div class="pinyin" id="custom-pinyin" style="display: none"></div>
      <div class="row" style="display: none" id="customControls">
        <button class="icon-btn" onclick="playCustomVoice()">🔊</button>
        <button class="icon-btn" onclick="playCustomStroke()">✍️</button>
        <button class="icon-btn" onclick="startCustomListen()">🎤</button>
      </div>
      <div class="row" style="display: none" id="customButtons">
        <button class="big-btn btn-green" onclick="customKnowChar()">
          ✅ 认识
        </button>
        <button class="big-btn btn-red" onclick="customUnknowChar()">
          ❌ 不认识
        </button>
      </div>
    </div>

    <!-- 已认识汉字页面（页签形式） -->
    <div class="page" id="pageLearnedChars">
      <div class="top-title">📖 已认识汉字</div>
      <div class="tab-container">
        <div class="tab-buttons">
          <button class="tab-btn active" onclick="switchTab('learned')">
            已认识
          </button>
          <button class="tab-btn" onclick="switchTab('wrong')">错字历史</button>
        </div>
        <div class="tab-content active" id="learnedContent">
          <div id="learnedList" class="wrong-list"></div>
        </div>
        <div class="tab-content" id="wrongContent">
          <div id="mergedWrongList" class="wrong-list"></div>
          <button class="big-btn btn-red" onclick="clearMergedWrongHistory()">
            🗑️ 清空历史记录
          </button>
        </div>
      </div>
    </div>

            }

      // 自动生成每日生字规划（从指定日期开始，每天5个，循环3000字）
      function autoBuildPlan() {
        // 确保charList已经加载完成
        if (charList.length === 0) {
          console.log("汉字数据尚未加载完成，稍后再生成计划");
          return;
        }

        let plan = getDayPlan();
        // 无论是否已有计划，都重新生成，确保与当前charList匹配
        const startKey = `${START_STUDY_DATE.getFullYear()}-${START_STUDY_DATE.getMonth() + 1}-${START_STUDY_DATE.getDate()}`;

        let idx = 0;
        let d = new Date(START_STUDY_DATE); // 从指定日期开始生成计划
        // 生成600天的学习计划（3000字/5字/天 = 600天）
        for (let i = 0; i < 600; i++) {
          let y = d.getFullYear();
          let m = d.getMonth() + 1;
          let day = d.getDate();
          let key = `${y}-${m}-${day}`;
          let arr = [];
          for (let j = 0; j < DAY_CHAR_COUNT; j++) {
            if (idx >= charList.length) idx = 0; // 3000字循环
            arr.push(charList[idx].c);
            idx++;
          }
          plan[key] = arr;
          d.setDate(d.getDate() + 1);
        }
        saveDayPlan(plan);
        console.log("使用加载的汉字数据生成学习计划");
      }

        // 当月日期

          if (hasPlan) cls += " has-plan";
          html += `<div class="${cls}" onclick="openDayPlan(${calendarYear},${calendarMonth},${d})">${d}</div>`;

      function getRecent3DaysChars() {

        for (let i = -2; i <= 0; i++) {

          let dayChars = getDayPlan()[key] || [];
          recentChars = [...recentChars, ...dayChars];

        return recentChars.slice(0, 15);

      function nextChar() {
        if (isFromWrongBook) {
          openWrongBook();
          return;
        }
        // 使用当前日期获取学习计划
        const today = new Date();
        const targetKey = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
        let targetChars = getDayPlan()[targetKey];

        // 确保targetChars有效
        if (!targetChars || targetChars.length === 0) {
          // 如果没有计划，使用charList的前5个汉字
          targetChars = charList.slice(0, DAY_CHAR_COUNT).map((item) => item.c);
        }

        // 确保targetChars不包含重复值
        targetChars = [...new Set(targetChars)];

        // 确保至少有一个汉字
        if (targetChars.length === 0) {
          targetChars = ["一"];
        }

        // 确保currentIndex有效
        if (currentIndex < 0 || currentIndex >= charList.length) {
          currentIndex = 0;
        }

        const item = charList[currentIndex];
        if (!item) {
          currentIndex = 0;

        const currentChar = item ? item.c : "";
        const currentPos = targetChars.indexOf(currentChar);

        if (currentPos < targetChars.length - 1 && currentPos !== -1) {
          // 找到下一个汉字的索引
          const nextChar = targetChars[currentPos + 1];
          const nextIndex = charList.findIndex((item) => item.c === nextChar);
          if (nextIndex !== -1) {
            currentIndex = nextIndex;
          } else {
            // 如果找不到，使用当前索引的下一个
            currentIndex = (currentIndex + 1) % charList.length;
          }
          renderStudySlide();
          showChar();
        } else {
          showToast("🎉 今日5个汉字学习完成！太优秀啦！");
          setTimeout(goBack, 1500);
        }
      }
      function openReview() {
        // 获取近3天的汉字列表（15个）
        const recentChars = getRecent3DaysChars();
        if (recentChars.length === 0) {
          showToast("暂无近3天的学习内容可复习");
          return;
        }
        // 设置复习起始索引为第一个汉字
        reviewIndex = charList.findIndex((item) => item.c === recentChars[0]);
        renderReviewSlide();
        showReviewChar();
        switchPage("pageReview");
      }
      function renderReviewSlide() {
        const box = document.getElementById("reviewSlide");
        let html = "";
        // 获取近3天的汉字（15个）
        const recentChars = getRecent3DaysChars();

        if (recentChars.length === 0) {
          html = '<div class="empty-tip">暂无近3天的学习内容可复习🎉</div>';
        } else if (!charList || charList.length === 0) {
          html = '<div class="empty-tip">汉字数据正在加载，请稍候...</div>';
        } else {
          recentChars.forEach((char, i) => {
            const idx = charList.findIndex((c) => c.c === char);
            html += `<div class="slide-thumb ${idx === reviewIndex ? "active" : ""}" onclick="goReview(${idx})">${char}</div>`;
          });
        }
        box.innerHTML = html;
      }
      function goReview(index) {
        reviewIndex = index;
        renderReviewSlide();
        showReviewChar();
      }
      function showReviewChar() {
        // 确保charList和reviewIndex有效
        if (!charList || charList.length === 0) {
          console.error("汉字数据为空");
          return;
        }

        // 确保reviewIndex在有效范围内
        if (reviewIndex < 0 || reviewIndex >= charList.length) {
          reviewIndex = 0; // 重置为第一个汉字
        }

        const item = charList[reviewIndex];
        if (!item) {
          console.error("当前汉字数据无效");
          return;
        }

        initReviewChar(item.c);
      }
      function reviewRight() {
        showToast("✅ 读对！非常棒！");
        // 获取近3天的汉字列表（15个）
        const recentChars = getRecent3DaysChars();

        // 确保charList和reviewIndex有效
        if (
          !charList ||
          charList.length === 0 ||
          reviewIndex < 0 ||
          reviewIndex >= charList.length
        ) {
          console.error("汉字数据无效");
          setTimeout(goBack, 1500);
          return;
        }

        const item = charList[reviewIndex];
        if (!item) {
          console.error("当前汉字数据无效");
          setTimeout(goBack, 1500);
          return;
        }

        const currentChar = item.c;
        const currentPos = recentChars.indexOf(currentChar);

        if (currentPos < recentChars.length - 1) {
          reviewIndex = charList.findIndex(
            (item) => item.c === recentChars[currentPos + 1],
          );
          renderReviewSlide();
          showReviewChar();
        } else {
          showToast("🎉 今日复习完成！");
          setTimeout(goBack, 1500);
        }
      }
      function reviewWrong() {
        // 确保charList和reviewIndex有效
        if (
          !charList ||
          charList.length === 0 ||
          reviewIndex < 0 ||
          reviewIndex >= charList.length
        ) {
          console.error("汉字数据无效");
          setTimeout(goBack, 1500);
          return;
        }

        const item = charList[reviewIndex];
        if (!item) {
          console.error("当前汉字数据无效");
          setTimeout(goBack, 1500);
          return;
        }

        const char = item.c;
        addCharToWrong(char);
        showToast("❌ 已加入错字本（同时记录到错字历史），多练习几次就会啦");

        // 获取近3天的汉字列表（15个）
        const recentChars = getRecent3DaysChars();
        const currentChar = item.c;
        const currentPos = recentChars.indexOf(currentChar);

        if (currentPos < recentChars.length - 1) {
          reviewIndex = charList.findIndex(
            (item) => item.c === recentChars[currentPos + 1],
          );
          renderReviewSlide();
          showReviewChar();
        }
      }
      function getWrongData() {
        return JSON.parse(localStorage.wrongData || "[]");
      }
      function saveWrongData(data) {
        localStorage.wrongData = JSON.stringify(data);
      }
      function addCharToWrong(char) {
        let data = getWrongData();
        let item = data.find((i) => i.c === char);
        if (item) item.count++;
        else data.push({ c: char, count: 1 });
        saveWrongData(data);
        addCharToHistory(char);
      }
      function removeCharFromWrong(char) {
        let data = getWrongData();
        data = data.filter((i) => i.c !== char);
        saveWrongData(data);
        // 注意：错字历史记录保持不变，仍然保留
      }
      function getWrongHistory() {
        return JSON.parse(localStorage.wrongHistory || "[]");
      }
      function saveWrongHistory(data) {
        localStorage.wrongHistory = JSON.stringify(data);
      }
      function addCharToHistory(char) {
        let data = getWrongHistory();
        let exists = data.find((i) => i.c === char);
        if (!exists) data.push({ c: char });
        saveWrongHistory(data);
      }
      function openWrongBook() {
        isFromWrongBook = false;
        switchPage("pageWrong");
        renderWrongList();
      }
      function openWrongHistory() {
        switchPage("pageWrongHistory");
        renderWrongHistory();
      }
      function renderWrongList() {
        const data = getWrongData();
        const box = document.getElementById("wrongList");
        if (data.length === 0) {
          box.innerHTML = '<div class="empty-tip">暂无错字，太棒啦！🎉</div>';
          return;
        }
        let html = "";
        data.forEach((item) => {
          // 获取带声调的拼音
          let pinyin = "";
          if (typeof window.pinyinPro !== 'undefined') {
            try {
              pinyin = window.pinyinPro.pinyin(item.c, { toneType: 'tone' });
            } catch (e) {
              console.log('获取拼音失败:', item.c, e);
            }
          }
          html += `
        <div class="wrong-char" onclick="goToStudyChar('${item.c}')">
            <span class="hanzi-text">${item.c}</span>
            <span class="pinyin-text">${pinyin}</span>
            <span class="wrong-count">错${item.count}次</span>
        </div>`;
        });
        box.innerHTML = html;
      }
      function renderWrongHistory() {
        const data = getWrongHistory();
        const box = document.getElementById("wrongHistoryList");
        if (data.length === 0) {
          box.innerHTML = '<div class="empty-tip">暂无历史记录🎉</div>';
          return;
        }
        let html = "";
        data.forEach((item) => {
          // 获取带声调的拼音
          let pinyin = "";
          if (typeof window.pinyinPro !== 'undefined') {
            try {
              pinyin = window.pinyinPro.pinyin(item.c, { toneType: 'tone' });
            } catch (e) {
              console.log('获取拼音失败:', item.c, e);
            }
          }
          html += `
        <div class="wrong-char" onclick="goToStudyChar('${item.c}')">
            <span class="hanzi-text">${item.c}</span>
            <span class="pinyin-text">${pinyin}</span>
            <span class="wrong-count">历史错字</span>
        </div>`;
        });
        box.innerHTML = html;
      }
      // 当前正在学习的汉字（可能不在charList中）
      let currentStudyChar = null;
      // 是否从其他页面（全部汉字、已认识汉字、待复习错字）点击进入
      let isFromOtherPage = false;
      
      function goToStudyChar(char) {
        // 标记从其他页面进入
        isFromOtherPage = true;
        
        let idx = charList.findIndex((i) => i.c === char);
        
        if (idx !== -1) {
          // 如果汉字在charList中，使用正常流程
          currentIndex = idx;
          currentStudyChar = null;
        } else {
          // 如果汉字不在charList中，使用临时变量存储
          // 使用pinyin-pro库获取拼音
          let pinyin = "未知拼音";
          if (typeof window.pinyinPro !== 'undefined') {
            try {
              pinyin = window.pinyinPro.pinyin(char);
            } catch (e) {
              console.log('获取拼音失败:', char, e);
            }
          }
          currentStudyChar = { c: char, p: pinyin };
          // 设置一个无效的索引，让showChar知道使用currentStudyChar
          currentIndex = -1;
        }
        
        isFromWrongBook = true;
        renderStudySlide();
        showChar();
        switchPage("pageStudy");
      }
      function clearWrongBook() {
        if (!confirm("确定要清空所有待复习记录吗？")) return;
        saveWrongData([]);
        renderWrongList();
        showToast("已清空错字待复习");
      }
      function clearWrongHistory() {
        if (!confirm("确定要清空所有错字历史吗？此操作不可恢复！")) return;
        saveWrongHistory([]);
        renderWrongHistory();
        showToast("已清空错字历史记录");
      }

      // ========== 全部汉字展示页面逻辑 ==========
      function openAllChars() {
        switchPage("pageAllChars");
        renderAllChars();
      }

      function renderAllChars() {
        const grid = document.getElementById("allCharsGrid");

        if (charList.length === 0) {
          grid.innerHTML = '<div class="empty-tip">正在加载汉字数据...</div>';
          return;
        }

        let html = "";
        charList.forEach((item, index) => {
          html += `<div class="grid-char-item" onclick="startStudyByChar('${item.c}')">${item.c}</div>`;
        });
        grid.innerHTML = html;
      }

      // ========== 自定义学习页面逻辑 ==========
      function openCustomStudy() {
        switchPage("pageCustomStudy");
        // 重置自定义学习页面
        document.getElementById("customCharsInput").value = "";
        document.getElementById("customSlideWrap").style.display = "none";
        document.getElementById("customCharBox").style.display = "none";
        document.getElementById("custom-pinyin").style.display = "none";
        document.getElementById("customControls").style.display = "none";
        document.getElementById("customButtons").style.display = "none";
      }

      let customChars = [];
      let customIndex = 0;
      let customWriter;

      function startCustomStudy() {
        const input = document.getElementById("customCharsInput").value.trim();
        if (!input) {
          showToast("请输入要学习的汉字");
          return;
        }

        // 直接按字符分隔，不需要逗号
        customChars = input
          .split("")
          .map((char) => char.trim())
          .filter((char) => char.length > 0);

        if (customChars.length === 0) {
          showToast("请输入有效的汉字");
          return;
        }

        customIndex = 0;
        showCustomChar();

        // 显示学习界面
        document.getElementById("customCharBox").style.display = "flex";
        document.getElementById("custom-pinyin").style.display = "block";
        document.getElementById("customControls").style.display = "flex";
        document.getElementById("customButtons").style.display = "flex";
        
        // 显示要学习的汉字列表
        renderCustomSlide();
      }

      function showCustomChar() {
        if (customIndex >= customChars.length) {
          showToast("🎉 自定义学习完成！");
          setTimeout(openCustomStudy, 1500);
          return;
        }

        const char = customChars[customIndex];

        // 尝试从charList获取拼音，如果找不到则使用pinyin-pro库获取
        let pinyin = "未知拼音";
        const charItem = charList.find((item) => item.c === char);

        if (charItem && charItem.p !== "未知拼音") {
          pinyin = charItem.p;
        } else if (typeof window.pinyinPro !== "undefined") {
          // 使用pinyin-pro库获取拼音
          try {
            pinyin = window.pinyinPro.pinyin(char);
          } catch (e) {
            console.log("获取拼音失败:", char, e);
          }
        }

        customWriter = initChar("custom-target", char);
        document.getElementById("custom-pinyin").innerText = pinyin;
      }

      function renderCustomSlide() {
        const box = document.getElementById("customSlide");
        box.innerHTML = "";
        
        const currentChar = customChars[customIndex];
        
        customChars.forEach((char, i) => {
          const thumb = document.createElement("div");
          thumb.className = `slide-thumb ${char === currentChar ? "active" : ""}`;
          thumb.textContent = char;
          thumb.addEventListener("click", () => {
            customIndex = i;
            renderCustomSlide();
            showCustomChar();
          });
          box.appendChild(thumb);
        });
        
        // 显示滑块容器
        document.getElementById("customSlideWrap").style.display = "block";
      }

      function playCustomVoice() {
        const char = customChars[customIndex];
        const u = new SpeechSynthesisUtterance(char);
        u.lang = "zh-CN";
        u.rate = 0.9;
        window.speechSynthesis.speak(u);
      }

      function playCustomStroke() {
        customWriter.animateCharacter();
      }

      function startCustomListen() {
        if (
          !("webkitSpeechRecognition" in window) &&
          !("SpeechRecognition" in window)
        ) {
          showToast("请用 Chrome / Edge 浏览器打开，支持语音识别");
          return;
        }

        const SpeechRecognition =
          window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = "zh-CN";
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.maxAlternatives = 5;

        recognition.start();
        recognition.onresult = function (e) {
          const targetChar = customChars[customIndex];
          let ok = false;
          for (let i = 0; i < e.results.length; i++) {
            const transcript = e.results[i][0].transcript.trim();
            if (transcript.indexOf(targetChar) !== -1) {
              ok = true;
              break;
            }
          }
          if (ok) {
            showToast("✅ 读对了！");
            playNiceVoice();
            setTimeout(customNextChar, 1000);
          } else {
            showToast("😉 再试一次");
          }
        };
        recognition.onerror = function () {
          showToast("没听清，请离手机近一点慢慢读");
        };
      }

      function customKnowChar() {
        showToast("✅ 很棒！");
        customNextChar();
      }

      function customUnknowChar() {
        const char = customChars[customIndex];
        addCharToWrong(char);
        showToast("❌ 已加入错字本");
        customNextChar();
      }

      function customNextChar() {
        customIndex++;
        showCustomChar();
        // 更新滑块选中状态
        if (customIndex < customChars.length) {
          renderCustomSlide();
        }
      }

      // ========== 已学习汉字页面逻辑 ==========
      function openLearnedChars() {
        switchPage("pageLearnedChars");
        switchTab("learned");
      }

      function switchTab(tab) {
        // 切换页签按钮状态
        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) => btn.classList.remove("active"));
        document
          .querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`)
          .classList.add("active");

        // 切换内容
        document
          .querySelectorAll(".tab-content")
          .forEach((content) => content.classList.remove("active"));
        document.getElementById(`${tab}Content`).classList.add("active");

        // 渲染对应内容
        if (tab === "learned") {
          renderLearnedList();
        } else if (tab === "wrong") {
          renderMergedWrongList();
        }
      }

      function getLearnedChars() {
        // 这里简化处理，实际应该从本地存储中获取已学习的汉字
        // 暂时返回前100个汉字作为示例
        return charList.slice(0, 100).map((item) => item.c);
      }

      function renderLearnedList() {
        const learnedChars = getLearnedChars();
        const list = document.getElementById("learnedList");

        if (learnedChars.length === 0) {
          list.innerHTML = '<div class="empty-tip">暂无已认识汉字</div>';
          return;
        }

        let html = "";
        learnedChars.forEach((char) => {
          html += `
        <div class="wrong-char" onclick="startStudyByChar('${char}')">
            <span class="hanzi-text">${char}</span>
            <span class="wrong-count">已认识</span>
        </div>`;
        });
        list.innerHTML = html;
      }

      function renderMergedWrongList() {
        const wrongData = getWrongHistory();
        const list = document.getElementById("mergedWrongList");

        if (wrongData.length === 0) {
          list.innerHTML = '<div class="empty-tip">暂无错字历史记录</div>';
          return;
        }

        let html = "";
        wrongData.forEach((item) => {
          html += `
        <div class="wrong-char" onclick="goToStudyChar('${item.c}')">
            <span class="hanzi-text">${item.c}</span>
            <span class="wrong-count">历史错字</span>
        </div>`;
        });
        list.innerHTML = html;
      }

      function clearMergedWrongHistory() {
        if (!confirm("确定要清空所有错字历史吗？此操作不可恢复！")) return;
        saveWrongHistory([]);
        renderMergedWrongList();
        showToast("已清空错字历史记录");
      }
    </script>
  </body>
</html>
